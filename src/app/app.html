<main>
  <app-header></app-header>
  <app-exchange-picker></app-exchange-picker>
  <div class="w-[90%] lg:w-[65%] mx-auto mt-12 mb-4">
    <app-tabs [tabs]="tabs" [activeId]="activeTab" (tabChange)="onTabChange($any($event))"></app-tabs>
    @if (isNavigating()) {
      <div class="mx-auto mt-12 mb-4 animate-pulse">
        <div class="bg-gray-700 rounded-24 w-full border border-neutral-600 p-4 md:p-6 space-y-6">
          <!-- Header Row Skeleton -->
          <div class="flex items-center justify-between px-1">
            <div class="h-4 w-40 bg-neutral-600 rounded-4"></div>
            <div class="h-4 w-20 bg-neutral-600 rounded-4"></div>
          </div>

          <!-- List Skeletons -->
          <div class="space-y-3">
            <div class="bg-gray-600 rounded-16 p-4 md:p-5 border border-neutral-500 flex items-center justify-between">
              <div class="flex items-center gap-4">
                <div class="w-8 h-8 rounded-full bg-neutral-500"></div>
                <div class="space-y-2">
                  <div class="h-4 w-12 bg-neutral-500 rounded-4"></div>
                  <div class="h-3 w-20 bg-neutral-500 rounded-4"></div>
                </div>
              </div>
              <div class="flex items-center gap-4">
                <div class="space-y-2 flex flex-col items-end">
                  <div class="h-4 w-16 bg-neutral-500 rounded-4"></div>
                  <div class="h-3 w-10 bg-neutral-500 rounded-4"></div>
                </div>
                <div class="w-10 h-10 rounded-12 bg-neutral-500"></div>
              </div>
            </div>

            <div class="bg-gray-600 rounded-16 p-4 md:p-5 border border-neutral-500 flex items-center justify-between opacity-75">
              <div class="flex items-center gap-4">
                <div class="w-8 h-8 rounded-full bg-neutral-500"></div>
                <div class="space-y-2">
                  <div class="h-4 w-16 bg-neutral-500 rounded-4"></div>
                  <div class="h-3 w-16 bg-neutral-500 rounded-4"></div>
                </div>
              </div>
              <div class="flex items-center gap-4">
                <div class="space-y-2 flex flex-col items-end">
                  <div class="h-4 w-20 bg-neutral-500 rounded-4"></div>
                  <div class="h-3 w-12 bg-neutral-500 rounded-4"></div>
                </div>
                <div class="w-10 h-10 rounded-12 bg-neutral-500"></div>
              </div>
            </div>

            <div class="bg-gray-600 rounded-16 p-4 md:p-5 border border-neutral-500 flex items-center justify-between opacity-50">
              <div class="flex items-center gap-4">
                <div class="w-8 h-8 rounded-full bg-neutral-500"></div>
                <div class="space-y-2">
                  <div class="h-4 w-14 bg-neutral-500 rounded-4"></div>
                  <div class="h-3 w-24 bg-neutral-500 rounded-4"></div>
                </div>
              </div>
              <div class="flex items-center gap-4">
                <div class="space-y-2 flex flex-col items-end">
                  <div class="h-4 w-12 bg-neutral-500 rounded-4"></div>
                  <div class="h-3 w-8 bg-neutral-500 rounded-4"></div>
                </div>
                <div class="w-10 h-10 rounded-12 bg-neutral-500"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    } @else {
      <router-outlet />
    }
  </div>

  <!-- Toast Alert Notifications Stack -->
  <div class="fixed top-6 right-6 z-50 flex flex-col gap-3 max-w-sm w-full pointer-events-none">
    @for (toast of fxService.toasts(); track toast.id) {
      <div class="pointer-events-auto bg-gray-700 border border-neutral-500 rounded-xl p-4 shadow-2xl flex items-start gap-3 transition-all duration-300 animate-slide-in border-l-4"
           [class.border-l-yellow-500]="toast.type === 'warning'"
           [class.border-l-green-500]="toast.type === 'success'"
           [class.border-l-blue-500]="toast.type === 'info'">
        
        <!-- Warning Icon -->
        @if (toast.type === 'warning') {
          <div class="flex-shrink-0 text-yellow-500 mt-0.5">
            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
              <path fill-rule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/>
            </svg>
          </div>
        } @else {
          <!-- Success/Info Icon (fallback) -->
          <div class="flex-shrink-0 text-primary mt-0.5">
            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
              <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zm-1 9a1 1 0 100-2 1 1 0 000 2z" clip-rule="evenodd"/>
            </svg>
          </div>
        }

        <div class="flex-1 min-w-0">
          <h4 class="text-sm font-bold text-white tracking-wide">{{ toast.title }}</h4>
          <p class="text-xs text-neutral-200 mt-1 font-mono leading-relaxed">{{ toast.message }}</p>
        </div>

        <button type="button" (click)="fxService.removeToast(toast.id)" class="flex-shrink-0 text-neutral-200 hover:text-white transition-colors cursor-pointer focus:outline-none focus-visible:ring-1 focus-visible:ring-neon-lime">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>
    }
  </div>
</main>
